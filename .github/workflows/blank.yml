name: Xserver Automation with Recording (Node.js)

on:
  schedule:
    - cron: '0 9 1 * *' 
  workflow_dispatch:    

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Node.js 24を指定

    - name: Install dependencies
      run: |
        sudo apt-get update
        # 日本語文字化け対策のフォントを追加
        sudo apt-get install -y xvfb ffmpeg fonts-ipafont-gothic
        npm install selenium-webdriver chromedriver

    - name: Run script with Recording
      env:
        XSERVER_ID: ${{ secrets.XSERVER_ID }}
        XSERVER_PASS: ${{ secrets.XSERVER_PASS }}
      run: |
        # 1. 仮想ディスプレイ起動
        Xvfb :99 -screen 0 1280x1024x24 &
        export DISPLAY=:99

        # 2. 録画開始
        ffmpeg -f x11grab -video_size 1280x1024 -i :99.0 -codec:v libx264 -pix_fmt yuv420p video.mp4 &
        FFMPEG_PID=$!

        # 3. Node.jsスクリプト実行
        node xserver_automation.js

        # 4. 録画停止
        kill -INT $FFMPEG_PID
        sleep 2

    - name: Upload logs and video
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: automation-results
        path: |
          automation.log
          video.mp4